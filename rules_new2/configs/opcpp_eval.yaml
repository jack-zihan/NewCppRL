env:
  id: "NewPasture-v2"
  base_kwargs:
    action_type: "continuous"
    use_trajectory: true
    use_mist: true
    use_apf: true
    boundary_source: "box"

scenes:
  weed_dists: ["gaussian", "uniform"]
  # Match the legacy `rules/script.py` evaluation grid.
  seeds: [25, 27, 47, 21, 31, 88, 111, 121, 151, 200] #[25, 27, 47, 21, 31]
  levels:
    - name: "easy"
      num_obstacles_range: [0, 0]
      weed_num: 50
      map_ids: [2, 3, 6, 16, 20, 115]
    - name: "medium"
      num_obstacles_range: [1, 3]
      weed_num: 100
      map_ids: [4, 9, 21, 59, 80, 122]
    - name: "hard"
      num_obstacles_range: [4, 8]
      weed_num: 200
      # Note: this list matches rules/script.py as-is (contains a duplicate 22).
      map_ids: [22, 29, 166, 197, 483, 489]

methods:
  learning: []
#    - name: "ours"
#      ckpt: "ckpt/test_used/model_step03650000_reward2803.043_completion1.000_steps9581.5_overlap4815.2.pt"
#      architecture: "cnn"   # cnn | resnet | vanilla
#      device: "cuda:0"         # or cuda:0
#      enable_hif: false
  rules: # []
    - name: "BCP"
    - name: "JUMP"
    - name: "SNAKE"
    - name: "R_SNAKE"
    - name: "REACT"

eval:
  mode: "incremental" #"incremental"   # incremental | overwrite
  max_steps: -1
  L_thresholds: [0.9, 0.95, 0.98]
  workers_rules: 8
  workers_net: 4
  render_last_frame: true
  # Use a dedicated output directory to avoid mixing with other eval grids.
  output_root: "rules_new2/full_opcpp_eval"

