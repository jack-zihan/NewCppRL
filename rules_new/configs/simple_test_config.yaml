# 简化架构测试配置
# 用于新的PathPlannerTester系统

# 算法配置
algorithms:
  JUMP:
    enabled: true
    params:
      step_size: 10
      max_iterations: 1000
  
  SNAKE:
    enabled: true
    params:
      line_spacing: 5
      turn_radius: 3
  
  R-SNAKE:
    enabled: false  # 可以禁用某些算法
    params:
      line_spacing: 5
      optimization: true
  
  BCP:
    enabled: true
    params:
      boundary_offset: 2
  
  REACT:
    enabled: true
    params:
      reaction_distance: 10
      safety_margin: 2

# 场景配置
scenarios:
  seeds: [42, 100, 200]  # 随机种子（确保可重复性）
  difficulties: ['easy', 'medium', 'hard']
  map_sizes: [[100, 100], [150, 150]]

# 指标配置
metrics:
  coverage_thresholds: [0.90, 0.95, 0.98]
  coverage_radius: 2.0  # 机器人覆盖半径
  collision_threshold: 2.0  # 碰撞判定距离
  efficiency_weights:
    coverage: 0.4
    path_length: 0.3
    collision: 0.3

# 测试参数
max_steps: 1000  # 每个测试的最大步数
parallel: true  # 是否并行执行
max_workers: 4  # 最大并行数

# 输出配置
output:
  save_trajectories: true
  save_metrics: true
  generate_plots: true
  save_finished_picture: false  # 是否保存每个场景完成时的图片