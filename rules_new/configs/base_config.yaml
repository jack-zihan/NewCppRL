# Rules New1 基础配置文件
# 替代原有的硬编码配置，支持跨平台使用

# 环境参数
environment:
  width: 600
  height: 600
  return_map: true
  num_obstacle_min: 0
  num_obstacle_max: 0

# 小车参数  
agent:
  car_width: 5
  sight_width: 24
  sight_length: 24

# 路径设置 - 使用相对路径，消除硬编码
paths:
  data_dir: "data"
  log_dir: "logs"  # 相对于项目根目录
  ckpt_dir: "ckpt"

# 调试模式
debug_mode: true

# 默认种子
seed: 0

# 实验难度级别配置
difficulty_levels:
  easy:
    obstacle_range: [0, 0]
    weed_num: 50
    map_ids: [2, 3, 6, 16, 20]
  medium:
    obstacle_range: [2, 4] 
    weed_num: 100
    map_ids: [4, 9, 21, 59, 80]
  hard:
    obstacle_range: [5, 8]
    weed_num: 200
    map_ids: [22, 29, 57, 63, 22]

# 噪声配置
noise_sets:
  no_noise: [0, 0, 0]
  low_noise: [0.01, 1, 0.05] 
  medium_noise: [0.02, 2, 0.1]
  high_noise: [0.05, 5, 0.2]

# 杂草分布类型
weed_distributions: ["gaussian", "uniform"]

# 实验种子列表
experiment_seeds: [25, 27, 47, 21, 31]