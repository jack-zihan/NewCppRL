# 基准算法对比实验配置（增强版）
# 包含传统算法 + 神经网络模型对比，10个种子统计显著性

experiment:
  name: "baseline_algorithm_comparison"
  description: "对比JUMP, SNAKE, BCP, R_SNAKE, REACT等基准算法与SAC神经网络模型的性能"
  
# 实验参数（简化测试，只用1个种子）
parameters:
  seeds: [42]  # 简化测试
  difficulties: ["easy"] 
  weed_distributions: ["gaussian"]
  noise_levels: ["no_noise"]  # 对应原来的[0,0,0]
  
# 算法配置（传统算法 + 神经网络模型）
algorithms:
  # 传统路径规划算法
  - name: "JUMP"
    config_path: "algorithms/jump.yaml"
    enabled: true
  - name: "SNAKE"  
    config_path: "algorithms/snake.yaml"
    enabled: true
  - name: "R_SNAKE"
    config_path: "algorithms/r_snake.yaml" 
    enabled: true
  - name: "BCP"
    config_path: "algorithms/bcp.yaml"
    enabled: true
  - name: "REACT"
    config_path: "algorithms/react.yaml"
    enabled: true
    
  # 神经网络模型
  - name: "NN_baseline"
    model_path: "ckpt/sac_cont/2024-09-09_01-16-14_tanhnorm_loc/sac_baseline_continuous_t[01100]_r[2570.25=2509.63~2623.36] - 副本.pt"
    device: "cpu"
    enabled: true
  - name: "NN_ours"
    model_path: "ckpt/sac_cont/finetune/t[02350]_r[2782.06=2666.52~2872.77].pt"
    device: "cpu"
    enabled: true

# 环境配置（仅使用EnvironmentConfig支持的参数）
environment_overrides:
  use_apf: true
  use_box_boundary: true
  use_traj: false  # 简化配置以加快测试
  use_mist: false  # 简化配置
  use_global_features: false  # 简化配置以加快测试
  use_multiscale: false  # 简化配置

# 结果输出配置
output:
  base_dir: "logs"
  csv_format: true
  include_trajectory: false
  metrics:
    - coverage_90
    - coverage_95  
    - coverage_98
    - total_coverage
    - path_length
    - total_reward   # 新增奖励指标
    - total_steps    # 新增步数指标