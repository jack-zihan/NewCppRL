# SNAKE算法配置
algorithm:
  name: "SNAKE"
  type: "coverage_planning"
  
# 算法特定参数
parameters:
  # 贪婪搜索参数
  greedy_search: true
  forward_only: true
  
  # 路径连续性
  maintain_direction: true
  smooth_turns: false
  
# 覆盖策略  
coverage:
  pattern: "greedy_forward"
  adaptive_spacing: true
  
# 性能参数
performance:
  max_iterations: 5000
  timeout_seconds: 300