# JUMP算法配置
algorithm:
  name: "JUMP"
  type: "coverage_planning"
  
# 算法特定参数
parameters:
  # 跳跃策略参数
  jump_threshold: 4  # 跳跃触发的最小距离倍数
  safety_margin: 2   # 安全边距
  
  # 搜索范围
  forward_search: true
  vertical_search: true
  
  # 路径优化
  path_optimization: true
  obstacle_avoidance: true
  
# 覆盖策略
coverage:
  pattern: "boustrophedon"  # 牛耕式
  overlap_ratio: 0.1        # 重叠率
  
# 性能参数
performance:
  max_iterations: 5000
  timeout_seconds: 300  # 5分钟超时