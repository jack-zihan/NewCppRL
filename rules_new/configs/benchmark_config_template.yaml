# 基准测试配置模板
# 复制此文件并重命名为您自己的配置文件，如：my_benchmark.yaml
# 然后使用：python run_benchmark.py --config my_benchmark.yaml

benchmark:
  # ============ 算法配置 ============
  # 启用或禁用特定算法，并设置其参数
  algorithms:
    # 传统路径规划算法
    JUMP:
      enabled: true  # 是否启用此算法
      description: "JUMP路径规划算法"
      params:
        step_size: 10  # 步长
        max_iterations: 1000  # 最大迭代次数
    
    SNAKE:
      enabled: true
      description: "SNAKE路径规划算法"
      params:
        stripe_width: 20  # 条带宽度
        turn_radius: 15  # 转弯半径
    
    R_SNAKE:
      enabled: false  # 可以禁用某些算法
      description: "改进的SNAKE算法"
      params:
        stripe_width: 20
        turn_radius: 15
        optimization: true
    
    BCP:
      enabled: true
      description: "BCP路径规划算法"
      params:
        cell_size: 25  # 单元格大小
        coverage_threshold: 0.98  # 覆盖率阈值
    
    REACT:
      enabled: true
      description: "REACT反应式路径规划"
      params:
        lookahead_distance: 50  # 前瞻距离
        reaction_threshold: 0.3  # 反应阈值
    
    # 神经网络模型
    NN_baseline:
      enabled: false  # 如果没有模型文件，可以禁用
      description: "神经网络基线模型"
      model_path: "ckpt/your_baseline_model.pt"  # 修改为您的模型路径
      params:
        device: "cpu"  # 使用 "cuda" 如果有GPU
        deterministic: true  # 确定性推理
    
    NN_ours:
      enabled: false
      description: "我们的神经网络模型"
      model_path: "ckpt/your_model.pt"  # 修改为您的模型路径
      params:
        device: "cpu"
        deterministic: true

  # ============ 场景配置 ============
  scenarios:
    # 测试种子列表 - 确保可重现性
    seeds: [42, 100, 200]  # 修改为您想要的种子
    
    # 难度等级 - 可选: easy, medium, hard
    difficulties: ["easy", "medium"]  # 可以只测试部分难度
    
    # 杂草分布类型
    weed_distributions: ["gaussian", "uniform"]
    
    # 噪声级别 - 可选: no_noise, low_noise, medium_noise, high_noise
    noise_levels: ["no_noise"]  # 添加噪声测试：["no_noise", "low_noise"]
    
  # ============ 指标配置 ============
  metrics:
    # 覆盖率阈值 - 记录达到这些覆盖率时的路径长度
    coverage_thresholds: [0.90, 0.95, 0.98]
    
    # 是否收集完整轨迹数据（会增加存储开销）
    collect_trajectory: true
    
    # 是否收集碰撞信息
    collect_collision: true
    
    # 每个场景的最大步数限制
    max_steps: 1000
    
    # 单个测试的超时时间（秒）
    timeout: 60
  
  # ============ 输出配置 ============
  output:
    # 是否在场景完成时保存渲染图片
    save_finished_picture: true  # 设为true以保存每个场景的完成图
    
    # 是否保存完整轨迹数据
    save_trajectories: false  # 如果不需要详细分析，可以设为false节省空间
    
    # 是否保存统计信息
    save_statistics: true
    
    # 是否创建算法对比图
    create_comparison_plots: true
    
    # 图片格式和质量
    image_format: "png"  # 可选: png, jpg, svg
    image_dpi: 100  # 图片分辨率
  
  # ============ 并行执行配置 ============
  parallel:
    # 是否启用并行执行
    enabled: true  # 设为false用于调试
    
    # 最大工作进程数
    # null = 使用所有CPU核心
    # 数字 = 限制进程数
    max_workers: 4  # 限制为4个进程
    
    # 批处理大小
    batch_size: 10  # 每批处理的场景数
  
  # ============ 日志配置 ============
  logging:
    # 日志级别: DEBUG, INFO, WARNING, ERROR
    level: "INFO"
    
    # 是否保存日志到文件
    save_to_file: true
    
    # 日志格式
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# ============ 自定义实验配置示例 ============
# 您可以添加自己的实验特定配置
custom_experiment:
  name: "My Experiment"
  description: "测试不同算法在简单场景下的性能"
  tags: ["performance", "comparison", "2024"]
  
  # 可以添加特定的实验参数
  special_params:
    focus_on_speed: true
    ignore_minor_collisions: false