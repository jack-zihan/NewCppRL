env:
  id: "NewPasture-v2"
  base_kwargs:
    state_size: [256, 256]
    state_downsize: [256, 256]
    action_type: "continuous"
    use_trajectory: true
    use_box_boundary: true
    use_apf: true
    use_mist: true
    multiscale_feature_size: 32

scenes:
  weed_dists: ["gaussian", "uniform"]
  seeds: [25, 27, 47]

  levels:
    - name: "easy"
      num_obstacles_range: [0, 0]
      weed_num: 50
      map_ids: [2, 3]
    - name: "medium"
      num_obstacles_range: [2, 4]
      weed_num: 100
      map_ids: [4, 9]

methods:
  learning:
    - name: "sac_example"
      ckpt: "ckpt/model_step00001000.pt"
      architecture: "resnet"    # or "vanilla"
  rules:
    - name: "BCP"
    - name: "SNAKE"
    - name: "R_SNAKE"
    - name: "JUMP"
    - name: "REACT"

eval:
  max_steps: 2000
  L_thresholds: [0.9, 0.95, 0.98]
  workers_learning: 2
  workers_rules: 4
  render_last_frame: true
  output_root: "rules_new/outputs_eval_v2"

