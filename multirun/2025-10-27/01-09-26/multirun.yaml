hydra:
  run:
    dir: outputs/${logger.exp_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task: []
  job:
    name: sac_curriculum_with_pretrain
    chdir: true
    override_dirname: ''
    id: ???
    num: ???
    config_name: config-sync-server-hif-pretrain-test
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.1'
    cwd: /home/lzh/NewCppRL
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/lzh/NewCppRL/rl_new/sac_cont_sy
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
pretrained_model: null
seed: 1
in_server: false
env:
  env_id: NewPasture-v6
  env_kwargs:
    render_repeat_times: 1
collector:
  total_frames: 300
  frames_per_batch: 2
  init_random_frames: 20
  env_per_collector: 1
  num_collectors: 2
  pin_memory: false
training:
  device: cpu
  use_amp: false
  total_updates: 10000
buffer:
  buffer_size: 50
  batch_size: 2
  pin_memory: false
  prefetch: 1
  temp_dir: ~/rl_temp_train_data
  shared_memory: true
  bucketed: true
  bucket_capacity_ratio:
  - 0.25
  - 0.25
  - 0.5
  success_threshold: 0.99
  near_end_threshold: 0.9
  alpha: 0.7
  beta: 0.5
optim:
  lr_actor: 0.0001
  weight_decay_actor: 0.0
  eps_actor: 1.0e-08
  lr_critic: 0.001
  weight_decay_critic: 0.0
  eps_critic: 1.0e-08
  lr_alpha: 0.0003
  weight_decay_alpha: 0.0
  eps_alpha: 1.0e-08
  max_grad_norm: 1.0
loss:
  gamma: 0.99
  n_steps: 1
  target_update_polyak: 0.995
  target_entropy_weight: 0.2
  target_entropy: auto
  utd_ratio: 1
  loss_function: l2
  alpha_init: 1.0
hif:
  enabled: true
  decoder_type: two_stage
  initial_weight: 1.0
  tv_weight: 0.0
  use_tv: false
  weights:
    S1: 0.2
    S2: 0.1
    S3: 0.04
  env_strategy:
    v4: skip
    v5: low_weight
    v6: full
    v5_weight: 0.05
  online_auxiliary: true
  update_frequency: 1
  log_metrics: true
  log_interval: 10
  visualize: false
  vis_interval: 100
  pretrain:
    enabled: true
    min_buffer_frames: 6
    max_updates: 5
    actor_lr: 0.0003
    loss_weight: 1.0
    reset_optimizer_after: false
compile:
  enable: false
  mode: null
  warmup: 0
  cudagraphs: false
logger:
  mode: offline
  backend: null
  project_name: SAC_TEST
  group_name: Test
  exp_name: v6_test
  model_name: ContinuousSAC
  eval_worker: 1
  eval_interval: 5
  eval_episodes: 1
  eval_max_steps: 20
  eval_video: true
  eval_video_skip: 1
  eval_device: cpu
  show_progress: false
curriculum:
  enabled: true
  s1_consecutive_k: 1
  s2_consecutive_k: 1
  s2s3_threshold: 0.05
  s1_min_completion: 0.0
  s2_min_completion: 0.0
  stages:
  - name: S1
    reward_field_group_coef: 1.0
    reward_turning_group_coef: 0.5
    reward_overlap_penalty: -0.1
    overlap_tolerance: 5.0
    sampling_ratio:
    - 0.4
    - 0.3
    - 0.3
    field_scale_enabled: true
    field_scale_range:
    - 0.6
    - 0.7
  - name: S2
    reward_field_group_coef: 0.5
    reward_turning_group_coef: 0.2
    reward_overlap_penalty: -0.15
    overlap_tolerance: 2.0
    sampling_ratio:
    - 0.3
    - 0.3
    - 0.4
    field_scale_enabled: true
    field_scale_range:
    - 0.8
    - 0.9
  - name: S3
    reward_field_group_coef: 0.1
    reward_turning_group_coef: 0.05
    reward_overlap_penalty: -0.1
    overlap_tolerance: 1.0
    sampling_ratio:
    - 0.2
    - 0.3
    - 0.5
    field_scale_enabled: true
    field_scale_range:
    - 1.0
    - 1.0
