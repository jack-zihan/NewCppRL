pretrained_model: null
ckpt_name: sync_version
seed: 42
env:
  env_id: NewPasture-v2
  env_kwargs: null
collector:
  total_frames: 10000
  frames_per_batch: 500
  init_random_frames: 1000
  gpu_devices: null
  processes_per_gpu: 8
  cpu_workers: 8
  pin_memory: true
training:
  device: cuda:0
  use_amp: true
  total_updates: 1000000
buffer:
  buffer_size: 500000
  batch_size: 256
  pin_memory: true
  prefetch: 3
  temp_dir: ~/rl_temp_train_data
optim:
  lr_actor: 1.0e-05
  weight_decay_actor: 0.0001
  lr_critic: 0.0003
  weight_decay_critic: 0
  lr_alpha: 0.0003
  weight_decay_alpha: 0
  max_grad_norm: null
loss:
  gamma: 0.99
  target_update_polyak: 0.9997
  target_entropy_weight: 0.2
  target_entropy: auto
  utd_ratio: 1
  loss_function: l2
compile:
  enable: true
  mode: reduce-overhead
  warmup: 2
  cudagraph: true
logger:
  backend: wandb
  project_name: SAC
  model_name: ContinuousSAC
  exp_name: Train
  test_interval: 5000
  log_freq: 10000
