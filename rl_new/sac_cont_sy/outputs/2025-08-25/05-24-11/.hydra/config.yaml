pretrained_model: null
ckpt_name: test_run
seed: 42
env:
  env_id: NewPasture-v2
  env_kwargs:
    use_apf: true
    num_obstacles_range:
    - 0
    - 8
    reward_weed: 0.01
    reward_turn_gap: 0.01
    reward_collision: -10.0
collector:
  total_frames: 2000
  frames_per_batch: 500
  init_random_frames: 1000
  gpu_devices: null
  processes_per_gpu: 8
  cpu_workers: 2
  pin_memory: true
training:
  device: cpu
  use_amp: true
  total_updates: 1000000
buffer:
  buffer_size: 5000
  batch_size: 32
  pin_memory: true
  prefetch: 3
  temp_dir: ~/rl_temp_train_data
optim:
  lr_actor: 1.0e-05
  weight_decay_actor: 0.0001
  lr_critic: 0.0003
  weight_decay_critic: 0
  lr_alpha: 0.0003
  weight_decay_alpha: 0
  max_grad_norm: null
loss:
  gamma: 0.99
  target_update_polyak: 0.9997
  target_entropy_weight: 0.2
  target_entropy: auto
  utd_ratio: 1
  loss_function: l2
compile:
  enable: false
  mode: reduce-overhead
  warmup: 2
  cudagraph: false
logger:
  backend: null
  project_name: SAC
  model_name: ContinuousSAC
  exp_name: Train
  test_interval: 50000
  log_freq: 10000
