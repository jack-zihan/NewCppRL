# SAC 同步训练（v2 复现版，基于优化脚本）
# 修复版本：补全缺失参数，确保与 sac.py + config-sync-server.yaml 等效

pretrained_model: null
seed: 42
in_server: False

model:
  architecture: "cnn" # "resnet"
  backbone: "resnet18"

env:
  env_id: "NewPasture-v2"
  env_kwargs:
    # 核心奖励参数（与 curriculum.stages[0] 保持一致）
    weed_count: 200
    reward_field_group_coef: 0.125
    reward_turning_group_coef: 2
    reward_overlap_penalty: 5
    overlap_tolerance: 1.0
#    map_dir: "envs_new/maps/indoor_coverage"
    map_dir: "envs_new/maps/weed_coverage"
#    use_box_boundary: False

    # 课程学习参数（与 curriculum.stages[0] 保持一致）
    field_scale_enabled: false
    field_scale_range: [1.0, 1.0]

    # 地图难度参数（默认与原 sac.py 一致，为(5,8)）
    num_obstacles_range: [5, 8]

    # v2 环境特有参数
    use_apf: true
    use_trajectory: true
    use_mist: true

    # state_size: [256, 256]
    # state_downsize: [256, 256]
    # multiscale_feature_size: 32



collector:
  total_frames: 4_000_000
  frames_per_batch: 20
  init_random_frames: 50_000
  env_per_collector: 1
  num_collectors: 32
  pin_memory: true

training:
  device: cuda:0
  use_amp: False
  total_updates: 1_000_000
  grad_accum_steps: 1  # 修复：添加梯度累积参数（1=无梯度累积，等价于原始sac.py）

buffer:
  buffer_size: 500_000
  batch_size: 2048
  pin_memory: false
  prefetch: 3 #10               # 仅在非分桶回放下生效
  temp_dir: "/root/autodl-tmp/rl_temp_train_data"
  shared_memory: True
  bucketed: false            # 关闭分桶：与原 sac.py 对齐
  bucket_capacity_ratio: [0.25, 0.25, 0.50]
  success_threshold: 0.99
  near_end_threshold: 0.90
  alpha: 0.7
  beta: 0.5

optim:
  lr_actor: 1.0e-5
  weight_decay_actor: 1.0e-4
  eps_actor: 1.0e-8
  lr_critic: 3.0e-4
  weight_decay_critic: 0
  eps_critic: 1.0e-8
  lr_alpha: 3.0e-4
  weight_decay_alpha: 0
  eps_alpha: 1.0e-8
  max_grad_norm: 1.0

loss:
  gamma: 0.99
  n_steps: 1                 # 正确：1-step TD（对齐原始 sac.py 的标准行为）
  target_update_polyak: 0.9997
  target_entropy_weight: 0.2
  target_entropy: "auto"
  utd_ratio: 1
  loss_function: l2
  alpha_init: 1.0

# 关闭 HIF 及预训练（保留完整结构，避免运行时错误）
hif:
  enabled: false
  decoder_type: "full"
  initial_weight: 0.0
  tv_weight: 1.0e-5
  use_tv: true
  weights:
    S1: 0.0
    S2: 0.0
    S3: 0.0
  env_strategy:
    v4: "skip"
    v5: "skip"
    v6: "skip"
    v5_weight: 0.0
  online_auxiliary: false
  update_frequency: 1
  log_metrics: false
  log_interval: 100
  visualize: false
  vis_interval: 1000
  pretrain:  # 修复：补全必需字段（即使不启用也必须定义）
    enabled: false
    min_buffer_frames: 16384
    max_updates: 0
    actor_lr: 3.0e-4
    loss_weight: 1.0
    reset_optimizer_after: false

compile:
  enable: false
  mode:
  warmup: 2
  cudagraphs: false

logger:
  mode: online
  backend: wandb
  project_name: SAC_2025_Weed
  group_name: Weed
  exp_name: Weed_v2_Optimized
  model_name: ContinuousSAC
  eval_worker: 1
  eval_interval: 50_000
  eval_episodes: 9
  eval_max_steps: 3600
  eval_video: true
  eval_video_skip: 25
  eval_device: cpu
  show_progress: true

curriculum:
  enabled: false #true              # 启用课程学习（切换条件内聚到各阶段配置）
  stages:
    - name: S1  # 第一阶段：基础探索学习
      # 切换条件（内聚到阶段配置）
      min_completion: 0.90         # 完成率阈值
      consecutive_k: 3             # 连续达标次数
      # stability_tolerance 不设置 = 只检查 completion
      # 奖励配置
      reward_field_group_coef: 0.125
      reward_turning_group_coef: 0.0
      reward_overlap_penalty: 0.0
      overlap_tolerance: 5.0
      sampling_ratio: [0.34, 0.33, 0.33]
      field_scale_enabled: false
      field_scale_range: [1.0, 1.0]
      num_obstacles_range: [0, 8]

    # - name: S2  # 第二阶段：终态（由列表位置决定，最后一个阶段自动成为终态）
    #   # 切换条件（终态由位置判断：state.idx >= len(schedule) - 1）
    #   # 以下值保留用于：1) 文档参考 2) 未来如果添加S3则自动生效
    #   min_completion: 0.95
    #   consecutive_k: 5
    #   stability_tolerance: 0.05
    #   # 奖励配置
    #   reward_field_group_coef: 0.125
    #   reward_turning_group_coef: 0.0
    #   reward_overlap_penalty: 0.15
    #   overlap_tolerance: 5.0
    #   sampling_ratio: [0.34, 0.33, 0.33]
    #   field_scale_enabled: false
    #   field_scale_range: [1.0, 1.0]
    #   num_obstacles_range: [5, 8]

hydra:
  job:
     chdir: true
  run:
     dir: outputs/${logger.exp_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
