# SAC 同步训练（v2 复现版，基于优化脚本）
# 修复版本：补全缺失参数，确保与 sac.py + config-sync-server.yaml 等效

pretrained_model: null
seed: 42
in_server: False

env:
  env_id: "NewPasture-v2"
  env_kwargs:
    # 核心奖励参数（与 curriculum.stages[0] 保持一致）
    reward_field_group_coef: 0.125
    reward_turning_group_coef: 0.0
    reward_overlap_penalty: 0.0
    overlap_tolerance: 1.0

    # 课程学习参数（与 curriculum.stages[0] 保持一致）
    field_scale_enabled: false
    field_scale_range: [1.0, 1.0]

    # 地图难度参数（默认与原 sac.py 一致，为(5,8)）
    num_obstacles_range: [5, 8]

    # v2 环境特有参数
    use_apf: true
    use_trajectory: true
    use_mist: true

collector:
  total_frames: 4_000_000
  frames_per_batch: 20
  init_random_frames: 50_000
  env_per_collector: 1
  num_collectors: 32
  pin_memory: true

training:
  device: cuda:0
  use_amp: False
  total_updates: 1_000_000
  grad_accum_steps: 1  # 修复：添加梯度累积参数（1=无梯度累积，等价于原始sac.py）

buffer:
  buffer_size: 500_000
  batch_size: 2048
  pin_memory: false
  prefetch: 10               # 仅在非分桶回放下生效
  temp_dir: "/mnt/data/rl_temp_data"
  shared_memory: True
  bucketed: false            # 关闭分桶：与原 sac.py 对齐
  bucket_capacity_ratio: [0.25, 0.25, 0.50]
  success_threshold: 0.99
  near_end_threshold: 0.90
  alpha: 0.7
  beta: 0.5

optim:
  lr_actor: 1.0e-5
  weight_decay_actor: 1.0e-4
  eps_actor: 1.0e-8
  lr_critic: 3.0e-4
  weight_decay_critic: 0
  eps_critic: 1.0e-8
  lr_alpha: 3.0e-4
  weight_decay_alpha: 0
  eps_alpha: 1.0e-8
  max_grad_norm: 1.0

loss:
  gamma: 0.99
  n_steps: 1                 # 正确：1-step TD（对齐原始 sac.py 的标准行为）
  target_update_polyak: 0.9997
  target_entropy_weight: 0.2
  target_entropy: "auto"
  utd_ratio: 1
  loss_function: l2
  alpha_init: 1.0

# 关闭 HIF 及预训练（保留完整结构，避免运行时错误）
hif:
  backbone: "resnet34"
  enabled: false
  decoder_type: "full"
  initial_weight: 0.0
  tv_weight: 1.0e-5
  use_tv: true
  weights:
    S1: 0.0
    S2: 0.0
    S3: 0.0
  env_strategy:
    v4: "skip"
    v5: "skip"
    v6: "skip"
    v5_weight: 0.0
  online_auxiliary: false
  update_frequency: 1
  log_metrics: false
  log_interval: 100
  visualize: false
  vis_interval: 1000
  pretrain:  # 修复：补全必需字段（即使不启用也必须定义）
    enabled: false
    min_buffer_frames: 16384
    max_updates: 0
    actor_lr: 3.0e-4
    loss_weight: 1.0
    reset_optimizer_after: false

compile:
  enable: false
  mode:
  warmup: 2
  cudagraphs: false

logger:
  mode: online
  backend: wandb
  project_name: SAC_2025
  group_name: Weed
  exp_name: Weed_v2_Repro_from_Optimized
  model_name: ContinuousSAC
  eval_worker: 1
  eval_interval: 50_000
  eval_episodes: 9
  eval_max_steps: 5000
  eval_video: true
  eval_video_skip: 25
  eval_device: cpu
  show_progress: true

curriculum:
  enabled: true              # 启用两阶段课程：S1=原行为，S2仅增加障碍物数量
  s1_consecutive_k: 3
  s2_consecutive_k: 5
  s2s3_threshold: 0.05
  s1_min_completion: 0.90
  s2_min_completion: 0.95
  stages:
    - name: S1  # 第一阶段：完全复刻原 sac.py 行为（奖励与障碍物范围均与 env_kwargs 对齐）
      reward_field_group_coef: 0.125
      reward_turning_group_coef: 0.0
      reward_overlap_penalty: 0.0
      overlap_tolerance: 1.0
      sampling_ratio: [0.34, 0.33, 0.33]  # 修复：添加采样比例（均匀采样）
      field_scale_enabled: false
      field_scale_range: [1.0, 1.0]
      num_obstacles_range: [0, 8]
      # 不显式指定 num_obstacles_range，沿用 env_kwargs 中的 [5,8]

    - name: S2  # 第二阶段：奖励保持不变，仅将障碍物数量范围收紧为[6,8]
      reward_field_group_coef: 0.125
      reward_turning_group_coef: 0.0
      reward_overlap_penalty: 0.0
      overlap_tolerance: 1.0
      sampling_ratio: [0.34, 0.33, 0.33]
      field_scale_enabled: false
      field_scale_range: [1.0, 1.0]
      num_obstacles_range: [5, 8]

hydra:
  job:
     chdir: true
  run:
     dir: outputs/${logger.exp_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
