# SAC训练配置 - 优化版v2
# 支持Hydra命令行覆盖和所有性能优化

# 基础配置
pretrained_model: null
ckpt_name: optimized_v2
seed: 42

# ============ 数据收集配置 ============
collector:
  total_frames: 4_000_000
  frames_per_batch: 8192
  init_random_frames: 50_000
  update_freq: 1000  # 每1000次更新同步一次权重到收集器
  
  # 单进程收集器配置（aSyncDataCollector）
  num_envs: 32            # 单进程内并行环境数量
  gpu_device: cuda:1      # 收集GPU（null表示使用CPU）
  
  # 配置示例：
  # gpu_device: cuda:1    # 在第二张GPU上进行收集
  # gpu_device: null      # 只使用CPU收集
  # num_envs: 64          # 增加并行环境数量以提高吞吐量

# ============ 训练配置 ============
training:
  device: cuda:0          # 训练使用的GPU（收集器会自动排除此GPU）
  use_amp: true          # 混合精度训练（适合0-1掩码和浮点APF混合数据）
  total_updates: 1_000_000  # 总训练更新次数（与收集帧数独立）

# ============ 回放缓冲区 ============
buffer:
  buffer_size: 500_000
  batch_size: 2048
  pin_memory: true        # 锁定内存优化
  prefetch: 10           # 预取批次数，提升性能
  temp_dir: "~/rl_temp_train_data"  # 临时文件夹，避免网络文件系统瓶颈

# ============ 优化器配置 ============
optim:
  # Actor学习率（保持原始配置）
  lr_actor: 1.0e-5
  weight_decay_actor: 1.0e-4
  
  # Critic学习率
  lr_critic: 3.0e-4
  weight_decay_critic: 0
  
  # Alpha学习率
  lr_alpha: 3.0e-4
  weight_decay_alpha: 0
  
  # 梯度裁剪
  max_grad_norm: null    # null表示不裁剪，建议设置为1.0或10.0

# ============ 损失函数配置 ============
loss:
  gamma: 0.99
  target_update_polyak: 0.9997
  target_entropy_weight: 0.2
  target_entropy: "auto"
  utd_ratio: 2 # 1           # Update-To-Data比率
  loss_function: l2

# ============ 编译优化（借鉴官方SAC） ============
compile:
  enable: true           # 启用torch.compile（5-10x加速）
  mode: reduce-overhead  # 编译模式：default, reduce-overhead, max-autotune
  warmup: 2             # compile_with_warmup的预热步数
  cudagraph: true       # 启用CudaGraph（额外2x加速，需要PyTorch 2.0+）

# ============ 日志配置 ============
logger:
  backend: wandb        # wandb, tensorboard, null
  project_name: SAC
  model_name: ContinuousSAC
  exp_name: Train
  test_interval: 50_000  # 保存checkpoint间隔
  log_freq: 10_000      # 日志记录频率（帧数）

# ============ Hydra命令行覆盖示例 ============
# 使用方法：
# 1. 修改随机种子：
#    python sac.py seed=123
#
# 2. 修改批量大小和学习率：
#    python sac.py buffer.batch_size=1024 optim.lr_actor=1e-4
#
# 3. 使用所有GPU：
#    python sac.py collector.gpu_devices=-1
#
# 4. 禁用混合精度：
#    python sac.py training.use_amp=false
#
# 5. 改变训练设备：
#    python sac.py training.device=cuda:1
#
# 6. 组合多个参数：
#    python sac.py seed=42 collector.frames_per_batch=50 compile.enable=false
#
# 7. 禁用编译优化进行调试：
#    python sac.py compile.enable=false compile.cudagraph=false
#
# 8. 使用更激进的编译模式：
#    python sac.py compile.mode=max-autotune compile.warmup=5

# ============ 性能优化说明 ============
# 本配置已包含所有性能优化：
# - torch.set_float32_matmul_precision("high") - 矩阵乘法优化
# - tensordict pytree优化 - TensorDict性能提升
# - group_optimizers - 简化优化器管理
# - compile_with_warmup - 更好的编译优化
# - GradScaler正确实现 - 混合精度训练
# - MultiaSyncDataCollector - 异步多进程收集
# - timeit性能监控 - 详细性能分析
# - update_priority API - 正确的优先级更新